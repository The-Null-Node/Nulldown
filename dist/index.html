<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nulldown</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css">
  <style>
    :root {
      --bg-color: #0D0D0D;
      --text-color: #E5E5E5;
      --accent-color: #39FF14;
      --error-color: #BC2525;
      --card-bg: #121212;
      --border-color: #333;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      height: 100%;
    }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 16px;
      font-weight: 400;
    }
    
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    header {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-color);
    }
    
    .brand {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-color);
    }
    
    .container {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 1rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      height: 100%;
      max-height: 500px;
    }
    
    .editor-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
      max-height: 400px;
    }
    
    @media (min-width: 768px) {
      .editor-container {
        flex-direction: row;
        gap: 1rem;
      }
    }
    
    .editor-pane, .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 1rem;
      height: 100%;
    }
    
    @media (min-width: 768px) {
      .editor-pane, .preview-pane {
        margin-bottom: 0;
      }
    }
    
    h2 {
      margin-bottom: 0.5rem;
      font-size: 1rem;
      color: var(--accent-color);
    }
    
    textarea {
      flex: 1;
      min-height: 150px;
      max-height: 300px;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      resize: none;
      outline: none;
      height: 100%;
    }
    
    textarea:focus {
      border-color: var(--accent-color);
    }
    
    .preview {
      flex: 1;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      padding: 1rem;
      overflow-y: auto;
      min-height: 150px;
      max-height: 300px;
      height: 100%;
    }
    
    #editor-view, #drop-view, #loading-view {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    button:hover:not(:disabled) {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }
    
    button.primary {
      background-color: var(--accent-color);
      color: black;
      border: none;
    }
    
    button.primary:hover:not(:disabled) {
      background-color: #2be010;
    }
    
    .message {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.375rem;
    }
    
    .success {
      background-color: rgba(57, 255, 20, 0.1);
      border: 1px solid var(--accent-color);
    }
    
    .error-message {
      background-color: rgba(188, 37, 37, 0.2);
      border: 1px solid var(--error-color);
      color: #FF6B6B;
      padding: 0.75rem;
      border-radius: 0.375rem;
      margin-top: 1rem;
    }
    
    .link {
      color: var(--accent-color);
      text-decoration: none;
    }
    
    .link:hover {
      text-decoration: underline;
    }
    
    .url-container {
      display: flex;
      margin-bottom: 1rem;
    }
    
    .url-input {
      flex: 1;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-right: none;
      border-top-left-radius: 0.375rem;
      border-bottom-left-radius: 0.375rem;
      padding: 0.5rem;
      color: var(--text-color);
      font-size: 0.875rem;
    }
    
    .copy-btn {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }
    
    .drop-container {
      padding: 2rem 1rem;
      margin: 0 auto;
      max-width: 800px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .drop-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    
    .drop-id {
      font-size: 0.75rem;
      color: #666666;
    }
    
    .drop-content {
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
    }
    
    .drop-footer {
      margin-top: 1.5rem;
      text-align: center;
    }
    
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: var(--text-color);
      animation: spin 1s ease-in-out infinite;
      margin-right: 0.5rem;
    }
    
    .loading-spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid rgba(57, 255, 20, 0.3);
      border-radius: 50%;
      border-top-color: var(--accent-color);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 1rem;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex: 1;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    .markdown {
      color: var(--text-color);
      line-height: 1.6;
    }
    
    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4,
    .markdown h5,
    .markdown h6 {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
      color: white;
    }
    
    .markdown h1 {
      font-size: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }
    
    .markdown h2 {
      font-size: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--text-color);
    }
    
    .markdown h3 {
      font-size: 1.25rem;
    }
    
    .markdown p {
      margin-bottom: 1rem;
    }
    
    .markdown a {
      color: var(--accent-color);
      text-decoration: underline;
    }
    
    .markdown ul,
    .markdown ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }
    
    .markdown li {
      margin-bottom: 0.5rem;
    }
    
    .markdown blockquote {
      border-left: 4px solid var(--accent-color);
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      color: #AAAAAA;
    }
    
    .markdown pre {
      background-color: #1a1a1a;
      padding: 1rem;
      border-radius: 0.375rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    
    .markdown code {
      background-color: #1a1a1a;
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .markdown pre code {
      background-color: transparent;
      padding: 0;
    }
    
    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }
    
    .markdown th,
    .markdown td {
      border: 1px solid var(--border-color);
      padding: 0.5rem;
    }
    
    .markdown th {
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .markdown img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    
    .markdown hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 1.5rem 0;
    }
    
    .hidden {
      display: none !important;
    }
    
    footer {
      padding: 1rem;
      text-align: center;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      color: rgba(229, 229, 229, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">nulldown</div>
    </header>
    
    <div class="container">
      <div id="editor-view">
        <div class="editor-container">
          <div class="editor-pane">
            <h2>MARKDOWN</h2>
            <textarea id="markdown-input" placeholder="Type your markdown here..."></textarea>
          </div>
          
          <div class="preview-pane">
            <h2>PREVIEW</h2>
            <div id="markdown-preview" class="preview markdown"></div>
          </div>
        </div>
        
        <div class="controls">
          <button id="new-button">New</button>
          <button id="copy-button">Copy Link</button>
          <button id="share-button" class="primary">Share to the Void</button>
        </div>
        
        <div id="success-message" class="message success hidden">
          <p>Your drop has been created! Share this link:</p>
          <div class="url-container">
            <input type="text" id="drop-link-input" class="url-input" readonly>
            <button id="copy-url-button" class="primary copy-btn">Copy</button>
          </div>
        </div>
        
        <div id="error-message" class="error-message hidden">
          <p id="error-text">Something went wrong. Please try again.</p>
        </div>
      </div>
      
      <div id="drop-view" class="hidden">
        <div class="drop-container">
          <div class="drop-header">
            <div class="brand">NULLDOWN</div>
            <div id="drop-id" class="drop-id">Drop ID: </div>
          </div>
          <div class="drop-content">
            <div id="drop-content" class="markdown"></div>
          </div>
          <div class="drop-footer">
            <a href="/" class="link">Create your own Nulldown</a>
          </div>
        </div>
      </div>
      
      <div id="loading-view" class="hidden">
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <p>Loading drop...</p>
        </div>
      </div>
    </div>
    
    <footer>
      <p>Nulldown | Simple Markdown Sharing</p>
    </footer>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
  <script>
    // DOM Elements
    const app = document.getElementById('app');
    const editorView = document.getElementById('editor-view');
    const dropView = document.getElementById('drop-view');
    const loadingView = document.getElementById('loading-view');
    const markdownInput = document.getElementById('markdown-input');
    const markdownPreview = document.getElementById('markdown-preview');
    const shareButton = document.getElementById('share-button');
    const newButton = document.getElementById('new-button');
    const copyButton = document.getElementById('copy-button');
    const copyUrlButton = document.getElementById('copy-url-button');
    const successMessage = document.getElementById('success-message');
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const dropLinkInput = document.getElementById('drop-link-input');
    const dropContent = document.getElementById('drop-content');
    const dropIdElement = document.getElementById('drop-id');
    
    // Check if we're on a drop page
    const path = window.location.pathname;
    if (path.startsWith('/d/')) {
      const dropId = path.split('/')[2];
      if (dropId) {
        showLoading();
        loadDrop(dropId);
      }
    }
    
    // Update preview when markdown input changes
    markdownInput.addEventListener('input', updatePreview);
    
    // Handle share button click
    shareButton.addEventListener('click', shareDrop);
    
    // Handle new button click
    newButton.addEventListener('click', () => {
      markdownInput.value = '';
      updatePreview();
      successMessage.classList.add('hidden');
      errorMessage.classList.add('hidden');
    });
    
    // Handle copy link button click
    copyButton.addEventListener('click', () => {
      if (dropLinkInput.value) {
        copyToClipboard(dropLinkInput.value);
      }
    });
    
    // Handle copy URL button click
    copyUrlButton.addEventListener('click', () => {
      if (dropLinkInput.value) {
        copyToClipboard(dropLinkInput.value);
      }
    });
    
    // Initialize preview on page load
    updatePreview();
    
    // Update the preview with the current markdown
    function updatePreview() {
      const markdown = markdownInput.value;
      const html = marked.parse(markdown);
      markdownPreview.innerHTML = DOMPurify.sanitize(html);
    }
    
    // Generate a random ID
    function generateId() {
      return Math.random().toString(36).substring(2, 10);
    }
    
    // Share the current markdown as a drop
    async function shareDrop() {
      const content = markdownInput.value.trim();
      
      if (!content) {
        showError('Please enter some markdown content.');
        return;
      }
      
      const id = generateId();
      
      try {
        shareButton.disabled = true;
        shareButton.innerHTML = '<div class="spinner"></div>Sharing...';
        
        const response = await fetch('/api/store', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ id, content }),
        });
        
        if (!response.ok) {
          throw new Error(`Server returned ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (data.success) {
          const url = `${window.location.origin}/d/${id}`;
          dropLinkInput.value = url;
          successMessage.classList.remove('hidden');
          errorMessage.classList.add('hidden');
        } else {
          throw new Error('Failed to create drop.');
        }
      } catch (error) {
        console.error('Error creating drop:', error);
        showError('Failed to create drop. Please try again.');
      } finally {
        shareButton.disabled = false;
        shareButton.textContent = 'Share to the Void';
      }
    }
    
    // Load a drop by ID
    async function loadDrop(id) {
      try {
        showLoading();
        dropIdElement.textContent = `Drop ID: ${id}`;
        
        const response = await fetch(`/api/get/${id}`);
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('Drop not found.');
          }
          throw new Error(`Server returned ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (data.content) {
          const html = marked.parse(data.content);
          dropContent.innerHTML = DOMPurify.sanitize(html);
          hideLoading();
          showDropView();
        } else {
          throw new Error('Invalid drop data.');
        }
      } catch (error) {
        console.error('Error loading drop:', error);
        hideLoading();
        showError(error.message || 'The drop you requested could not be loaded.');
      }
    }
    
    // Show an error message
    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
      successMessage.classList.add('hidden');
    }
    
    // Copy text to clipboard
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const button = event.target;
        const originalText = button.textContent;
        button.textContent = 'Copied!';
        setTimeout(() => {
          button.textContent = originalText;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }
    
    // Show loading view
    function showLoading() {
      loadingView.classList.remove('hidden');
      editorView.classList.add('hidden');
      dropView.classList.add('hidden');
    }
    
    // Hide loading view
    function hideLoading() {
      loadingView.classList.add('hidden');
    }
    
    // Show drop view
    function showDropView() {
      dropView.classList.remove('hidden');
      editorView.classList.add('hidden');
    }
  </script>
</body>
</html>
