name = "nulldown"

compatibility_date = "2025-04-03"

# Tell Pages where your built static assets are
pages_build_output_dir = "dist"

# R2 binding - must match env.R2_BUCKET in functions code
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "nulldown"
preview_bucket_name = "nulldown-preview"

# D1 binding for search plus runtime metadata/index tables.
[[d1_databases]]
binding = "DB"
database_name = "nulldown-search"
database_id = "f5ed3a68-61ca-403d-9eb8-6c5fdc0369a6"
preview_database_id = "DB"
migrations_dir = "migrations"

